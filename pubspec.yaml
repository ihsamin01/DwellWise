name: dwell_wise
description: A professional, transparent real-estate and rental marketplace for the urban market in Bangladesh.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Database & Backend
  supabase_flutter: ^2.0.0

  # Notifications
  onesignal_flutter: ^5.0.0
  
  # Google Maps & Location
  google_maps_flutter: ^2.5.0

  # Opens the exact typed address in the Google Maps app / browser
  # (works without a Maps API key).
  url_launcher: ^6.2.0

  # AI Integration
  google_generative_ai: ^0.4.0
  
  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true